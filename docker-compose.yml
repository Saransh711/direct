version: '3.9'
services:
  api:
    build: .
    container_name: loan-api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '4000:4000'
    command: sh -c "npm run prisma:deploy && node dist/server.js"

  postgres:
    image: postgres:16-alpine
    container_name: loan-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loan_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: loan-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
