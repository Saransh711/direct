services:
  - type: web
    name: loan-eligibility-backend
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: loan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: loan-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://your-frontend-url.com
      - key: COOKIE_DOMAIN
        value: loan-eligibility-backend.onrender.com
      - key: SWAGGER_ENABLED
        value: 'false'
      - key: RATE_LIMIT_POINTS
        value: '100'
      - key: RATE_LIMIT_DURATION
        value: '60'
      - key: BUREAU_MAX_RETRIES
        value: '3'
      - key: BUREAU_TIMEOUT_MS
        value: '2000'
    depends_on:
      - loan-db
      - loan-redis

  - type: pserv
    name: loan-redis
    plan: starter
    region: oregon

databases:
  - name: loan-db
    plan: starter
    databaseName: loan_db
    user: loan_user
    region: oregon
